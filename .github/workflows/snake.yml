
name: GitHub Snake Game

on:
  # Run automatically every day
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger
  workflow_dispatch:

  # Run on pushes to main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Generate snake animation
      - name: Generate GitHub Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg

            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FFD700&color_dots=#FFF7AE,#FFE55C,#FFD700,#FFC300,#FFB000

            dist/ocean.gif?color_snake=#FFD700&color_dots=#FFF7AE,#FFE55C,#FFD700,#FFC300,#FFB000

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy generated files
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"

